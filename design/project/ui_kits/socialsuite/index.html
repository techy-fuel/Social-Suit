<!-- @startingPoint section="SocialSuite" subtitle="Full interactive app shell — 9 screens" viewport="1440x820" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SocialSuite by TechyFuel</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>html,body{margin:0;padding:0}</style>
</head>
<body>
<script type="module">
  import * as SSMockData from './mock-data.js';
  window.SSMockData = SSMockData;
  window.dispatchEvent(new Event('ss-mock-ready'));
</script>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="screens/AnalyticsScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/CalendarScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/ComposerScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/ConnectionsScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/InboxScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/SmartLinksScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/AdsScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/ReportingScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/TrackerScreen.jsx"></script>
<script type="text/babel" data-presets="react" src="App.jsx"></script>
<script type="text/babel">
  function boot() {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 50);
  }
  if (window.SSMockData) boot();
  else window.addEventListener('ss-mock-ready', boot);
</script>
</body>
</html>
