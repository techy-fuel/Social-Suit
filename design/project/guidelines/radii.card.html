<html><head><link rel="stylesheet" href="../styles.css"><style>

  <div class="col"><div class="b" style="border-radius:14px"></div>lg · 14px</div>
  <div class="col"><div class="b" style="border-radius:999px;width:64px"></div>full</div>

</body></html>
