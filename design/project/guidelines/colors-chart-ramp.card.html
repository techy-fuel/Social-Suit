<!-- @dsCard group="Colors" viewport="700x150" name="Chart blue ramp" subtitle="Multi-series data stays inside blue — never adds hue for variety" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--card);font-family:var(--font-body)}
.row{display:flex;gap:6px;align-items:flex-end;height:96px}
.bar{flex:1;border-radius:4px 4px 0 0}
.lbl{display:flex;gap:6px;margin-top:6px}
.lbl span{flex:1;text-align:center;font-size:9px;font-family:var(--font-mono);color:var(--text-muted)}
</style></head><body>
<div class="row">
  <div class="bar" style="height:100%;background:var(--blue-900)"></div>
  <div class="bar" style="height:82%;background:var(--blue-700)"></div>
  <div class="bar" style="height:66%;background:var(--blue-600)"></div>
  <div class="bar" style="height:52%;background:var(--blue-500)"></div>
  <div class="bar" style="height:40%;background:var(--blue-400)"></div>
  <div class="bar" style="height:28%;background:var(--blue-300)"></div>
  <div class="bar" style="height:18%;background:var(--blue-200)"></div>
</div>
<div class="lbl"><span>950</span><span>700</span><span>600</span><span>500</span><span>400</span><span>300</span><span>200</span></div>
</body></html>
