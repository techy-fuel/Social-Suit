      <Sidebar active="inbox" logoSrc="../../assets/logo/tf-mark.svg" />
      <div className="main">
        <TopBar title="Unified inbox" workspace={<WorkspaceSwitcher workspace={{initials:'HI',name:'HIRA Institute'}} />} />

        </div>
      </div>
    </React.Fragment>
  );
}

setTimeout(()=>window.lucide && window.lucide.createIcons(), 50);
