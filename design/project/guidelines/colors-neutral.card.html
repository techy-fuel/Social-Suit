<!-- @dsCard group="Colors" viewport="700x150" name="Neutral slate ramp" subtitle="Text, borders, surfaces" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--card);font-family:var(--font-body)}
.row{display:flex;gap:8px}
.sw{flex:1;height:96px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;border:1px solid var(--border)}
.hex{font-family:var(--font-mono);font-size:10px;opacity:.8}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--slate-900);color:#fff">900<div class="hex">#0F172A</div></div>
  <div class="sw" style="background:var(--slate-700);color:#fff">700<div class="hex">#334155</div></div>
  <div class="sw" style="background:var(--slate-500);color:#fff">500<div class="hex">#64748B</div></div>
  <div class="sw" style="background:var(--slate-300);color:#0F172A">300<div class="hex">#CBD5E1</div></div>
  <div class="sw" style="background:var(--slate-200);color:#0F172A">200<div class="hex">#E5E7EB</div></div>
  <div class="sw" style="background:var(--slate-100);color:#0F172A">100<div class="hex">#F1F5F9</div></div>
  <div class="sw" style="background:var(--slate-50);color:#0F172A">50<div class="hex">#F8FAFC</div></div>
</div>
</body></html>
