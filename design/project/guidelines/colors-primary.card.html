<!-- @dsCard group="Colors" viewport="700x150" name="Primary blues" subtitle="Deep / Royal / Sky — the only three brand hues" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--card);font-family:var(--font-body)}
.row{display:flex;gap:12px}
.sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font-size:12px}
.name{font-weight:600}
.hex{font-family:var(--font-mono);opacity:.85;font-size:11px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--blue-deep)"><span class="name">Deep Blue</span><span class="hex">#214DD8</span></div>
  <div class="sw" style="background:var(--blue-royal)"><span class="name">Royal Blue</span><span class="hex">#2C52EF</span></div>
  <div class="sw" style="background:var(--blue-sky)"><span class="name">Sky Blue</span><span class="hex">#058FE2</span></div>
</div>
</body></html>
